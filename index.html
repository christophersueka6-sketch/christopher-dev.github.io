<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio BTS SIO SLAM</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color:white;
        }

        .container{
            text-align:center;
            padding:50px;
            background:rgba(255,255,255,0.05);
            border-radius:20px;
            backdrop-filter: blur(10px);
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        h1{
            font-size:3rem;
            margin-bottom:10px;
        }

        h2{
            font-size:1.5rem;
            color:#38bdf8;
            margin-bottom:20px;
        }

        p{
            font-size:1.1rem;
            margin:10px 0;
            color:#cbd5e1;
        }

        .btn{
            display:inline-block;
            margin-top:30px;
            padding:15px 30px;
            background:#38bdf8;
            color:white;
            text-decoration:none;
            border-radius:10px;
            transition:0.3s;
        }

        .btn:hover{
            transform:translateY(-3px);
        }
    </style>
</head>
